name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_INSTAGRAM_ELFSIGHT_APP_ID: ${{ secrets.INSTAGRAM_ELFSIGHT_APP_ID }}
          VITE_INSTAGRAM_WIDGET_URL: ${{ secrets.INSTAGRAM_WIDGET_URL }}
          VITE_DIRECTORY_SHEET_ID: ${{ secrets.VITE_DIRECTORY_SHEET_ID }}
          VITE_SERVICES_SHEET_ID: ${{ secrets.VITE_SERVICES_SHEET_ID }}
          VITE_NETWORKING_SHEET_ID: ${{ secrets.VITE_NETWORKING_SHEET_ID || '1z37lsb3N9VAqIxgRMdPYrqVOm61bt6KltjJpsD_FIrw' }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment: github-pages
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
